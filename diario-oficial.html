<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diário Oficial - Portal TJP | Polícia DIC</title>
    <link rel="icon" href="assets/img/logo-tjp.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="assets/css/style.css">

    <style>
        .dojup-tabs {
            display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 2px solid var(--stroke); padding-bottom: 15px;
            overflow-x: auto; white-space: nowrap; scrollbar-width: none;
        }
        .dojup-tab {
            padding: 8px 20px; border-radius: 20px; font-size: 13px; font-weight: 700; cursor: pointer;
            background: #f1f5f9; color: var(--text-muted); border: 1px solid transparent; transition: all 0.2s;
        }
        .dojup-tab.active { background: var(--primary); color: #fff; }

        .dojup-card {
            background: var(--bg-card); border: 1px solid var(--stroke); border-radius: 8px; padding: 25px; 
            transition: all 0.3s; margin-bottom: 15px; display: flex; flex-direction: column; gap: 15px;
        }
        .dojup-card:hover { border-color: var(--primary); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .dojup-card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 15px; flex-wrap: wrap; }
        .dojup-orgao { font-size: 11px; font-weight: 800; color: var(--primary); text-transform: uppercase; display: block; margin-bottom: 5px;}
        .dojup-title { font-size: 18px; color: var(--text-main); font-weight: 800; margin: 0 0 5px 0; }
        .dojup-ementa { font-size: 14px; color: var(--text-muted); font-style: italic; margin: 0; line-height: 1.4; }
        
        .dojup-meta { display: flex; gap: 15px; align-items: center; font-size: 12px; color: #64748b; font-weight: 600; margin-top: 10px; }
        .dojup-badge { padding: 4px 10px; border-radius: 4px; font-size: 11px; text-transform: uppercase; font-weight: 800; }

        .dojup-content-box {
            background: #fff; border: 1px solid var(--stroke); padding: 30px; border-radius: 6px;
            font-family: 'Times New Roman', Times, serif; font-size: 15px; line-height: 1.6; color: #111;
            display: none; border-top: 4px solid var(--primary); overflow-x: auto;
        }

        .btn-ler-ato {
            background: none; border: 1px solid var(--primary); color: var(--primary);
            padding: 8px 20px; border-radius: 4px; font-size: 13px; font-weight: 700; cursor: pointer;
        }
        .btn-ler-ato:hover { background: var(--primary); color: #fff; }

        #btnCarregarMais {
            display: block; width: 250px; margin: 30px auto; padding: 12px;
            background: #fff; border: 1px solid var(--stroke); border-radius: 6px;
            font-weight: 700; color: var(--primary); cursor: pointer; transition: 0.2s; text-align: center;
        }
        #btnCarregarMais:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
    </style>
</head>
<body>

    <div id="global-header"></div>

    <div class="container">
        <main class="doj-section" style="padding: 40px 0; min-height: 60vh;">
            
            <div class="doj-header" style="margin-bottom: 30px; text-align: center;">
                <h2 style="font-size: 28px; color: var(--primary); margin-bottom: 10px; font-weight: 900; text-transform: uppercase;">
                    <i class="fa-solid fa-landmark-dome"></i> Diário Oficial
                </h2>
                <p style="color: var(--text-muted); font-size: 15px;">Consulte Atos, Portarias e Decretos do DIC e do TJP.</p>
            </div>

            <div class="dojup-tabs" id="tabsDojup">
                <div class="dojup-tab active" data-filter="Todos">Todos</div>
                <div class="dojup-tab" data-filter="Portaria">Portarias</div>
                <div class="dojup-tab" data-filter="Decreto">Decretos</div>
                <div class="dojup-tab" data-filter="Relatório">Relatórios de Transparência</div>
                <div class="dojup-tab" data-filter="TJP">Atos do TJP</div>
            </div>

            <div class="doj-list" id="dojupFeed"></div>

            <button id="btnCarregarMais" style="display:none;" onclick="carregarMaisNaTela()">Mostrar Documentos Antigos</button>
        </main>
    </div>

    <div id="global-footer"></div>

    <script type="module">
        import { db } from "./assets/js/layout.js";
        import { collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        // Memória Global para não sobrecarregar o Firebase
        let todosDocumentos = [];
        let filtroAtual = "Todos";
        let paginaAtual = 1;
        const itensPorPagina = 20;

        const feed = document.getElementById("dojupFeed");
        const btnMais = document.getElementById("btnCarregarMais");

        window.toggleLeituraAto = function(btn) {
            const box = btn.closest('.dojup-card').querySelector('.dojup-content-box');
            if (box.style.display === "block") {
                box.style.display = "none";
                btn.innerHTML = '<i class="fa-solid fa-eye"></i> Ler Documento';
            } else {
                box.style.display = "block";
                btn.innerHTML = '<i class="fa-solid fa-eye-slash"></i> Ocultar Documento';
            }
        };

        // Regra de cores conforme o seu pedido
        function pegarEstiloTag(categoria) {
            if (categoria === 'Decreto') return 'background: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5;'; // Vermelho
            if (categoria === 'Portaria') return 'background: #dbeafe; color: #1d4ed8; border: 1px solid #93c5fd;'; // Azul
            if (categoria === 'Relatório') return 'background: #fef08a; color: #a16207; border: 1px solid #fde047;'; // Amarelo
            return 'background: #dcfce7; color: #15803d; border: 1px solid #86efac;'; // Verde para todo o resto (Atos do TJP)
        }

        async function buscarDoFirebase() {
            feed.innerHTML = '<div style="text-align:center; padding: 40px; color: gray;"><i class="fa-solid fa-spinner fa-spin"></i> Sincronizando com o Diário Oficial...</div>';
            try {
                // Puxa os últimos 300 documentos de uma vez, mas ordenado. É rápido e evita falha de índice.
                const q = query(collection(db, "tjp_dojup_publicacoes"), orderBy("timestampDate", "desc"), limit(300));
                const snapshot = await getDocs(q);
                
                todosDocumentos = [];
                snapshot.forEach(doc => {
                    todosDocumentos.push(doc.data());
                });

                renderizarTela(true);
            } catch (error) {
                feed.innerHTML = `<div style="text-align:center; padding: 40px; color: #ef4444;">Erro ao conectar com o banco de dados.</div>`;
                console.error(error);
            }
        }

        function renderizarTela(resetarPagina = false) {
            if (resetarPagina) paginaAtual = 1;
            
            // Lógica do Filtro Local (Instantâneo)
            let filtrados = todosDocumentos;
            if (filtroAtual !== "Todos") {
                if (filtroAtual === "TJP") {
                    // TJP mostra tudo que não é as 3 do System
                    filtrados = todosDocumentos.filter(d => !['Portaria', 'Decreto', 'Relatório'].includes(d.categoria));
                } else {
                    filtrados = todosDocumentos.filter(d => d.categoria === filtroAtual);
                }
            }

            const totalParaExibir = paginaAtual * itensPorPagina;
            const documentosParaMostrar = filtrados.slice(0, totalParaExibir);

            feed.innerHTML = "";

            if (documentosParaMostrar.length === 0) {
                feed.innerHTML = '<div style="text-align:center; padding: 40px; color: gray;">Nenhum documento encontrado nesta categoria.</div>';
                btnMais.style.display = "none";
                return;
            }

            documentosParaMostrar.forEach(data => {
                const dataFmt = data.dataIso ? new Date(data.dataIso + 'T12:00:00').toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' }) : "---";
                const badgeEstilo = pegarEstiloTag(data.categoria);
                
                feed.innerHTML += `
                    <div class="dojup-card">
                        <div class="dojup-card-header">
                            <div style="flex: 1;">
                                <span class="dojup-orgao">${data.orgao}</span>
                                <h3 class="dojup-title">${data.titulo}</h3>
                                <p class="dojup-ementa">${data.ementa || ''}</p>
                                <div class="dojup-meta">
                                    <span><i class="fa-regular fa-calendar"></i> ${dataFmt}</span>
                                    <span class="dojup-badge" style="${badgeEstilo}">${data.categoria}</span>
                                </div>
                            </div>
                            <button class="btn-ler-ato" onclick="toggleLeituraAto(this)"><i class="fa-solid fa-eye"></i> Ler Documento</button>
                        </div>
                        <div class="dojup-content-box ck-content">${data.conteudo}</div>
                    </div>`;
            });

            // Se ainda tem documento sobrando, exibe o botão
            if (filtrados.length > totalParaExibir) {
                btnMais.style.display = "block";
            } else {
                btnMais.style.display = "none";
            }
        }

        window.carregarMaisNaTela = () => {
            paginaAtual++;
            renderizarTela(false);
        };

        document.querySelectorAll('.dojup-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.dojup-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                filtroAtual = tab.getAttribute('data-filter');
                renderizarTela(true);
            });
        });

        // Iniciar
        buscarDoFirebase();
    </script>
</body>
</html>
