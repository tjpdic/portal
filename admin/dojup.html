<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor DOJUP - JusPanel</title>
    <link rel="icon" href="/assets/img/logo-tjp.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="/assets/css/style.css">
    
    <script src="https://cdn.ckeditor.com/4.22.1/full-all/ckeditor.js"></script>

    <script src="/assets/js/admin_layout.js"></script>

    <style>
        .dojup-card-admin {
            background: #fff; border: 1px solid var(--stroke); border-radius: 8px; padding: 20px;
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;
            transition: 0.2s;
        }
        .dojup-card-admin:hover { border-color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .badge-dojup {
            background: #e2e8f0; color: #475569; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; text-transform: uppercase;
        }
        #btnCarregarMais {
            display: block; width: 100%; max-width: 300px; margin: 20px auto; padding: 12px;
            background: #fff; border: 1px solid var(--stroke); border-radius: 6px;
            font-weight: 700; color: var(--primary); cursor: pointer; transition: 0.2s; text-align: center;
        }
        #btnCarregarMais:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
    </style>
</head>
<body class="admin-body">

    <div id="toast" class="toast"><i class="fa-solid fa-circle-check"></i> <span id="toastMessage">Sucesso!</span></div>

    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="admin-brand">
                <img src="/assets/img/logo-tjp.png" alt="Logo TJP" style="height: 40px; width: auto;">
                <div><h2>JusPanel</h2><span>Administração Geral</span></div>
            </div>

            <nav class="admin-nav"></nav>
        </aside>

        <main class="admin-main">
            <header class="admin-header">
                <div class="header-search">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="Buscar documento do DOJUP...">
                </div>
                
                <div class="header-user">
                    <div class="user-info"><strong id="userNickDisplay">...</strong><span id="userCargoDisplay">...</span></div>
                    <img src="" id="userAvatarDisplay" class="user-avatar">
                    <div style="display: flex; gap: 5px; margin-left: 10px; border-left: 1px solid var(--stroke); padding-left: 15px;">
                        <a href="/intranet/index.html" class="btn-site" style="background: #e0f2fe; color: #0284c7;" title="Ir para a Intranet"><i class="fa-solid fa-network-wired"></i></a>
                        <a href="/index.html" class="btn-site" title="Ver Portal Público"><i class="fa-solid fa-house"></i></a>
                        <a href="#" onclick="logoutUser()" class="btn-logout" title="Sair"><i class="fa-solid fa-power-off"></i></a>
                    </div>
                </div>
            </header>

            <div class="admin-content">
                <div class="content-header">
                    <div>
                        <h1>Gestor do Diário Oficial</h1>
                        <p>Apenas publique documentos específicos do TJP aqui. Portarias e Decretos vêm do System DIC.</p>
                    </div>
                    <button class="btn-solid" onclick="abrirModalPublicar()"><i class="fa-solid fa-plus"></i> Nova Publicação</button>
                </div>

                <div id="listaPublicacoes"></div>
                <button id="btnCarregarMais" style="display:none;" onclick="carregarMaisDojup()">Carregar Publicações Antigas</button>
            </div>
        </main>
    </div>

    <div id="modalPublicar" class="modal" style="z-index: 10000;">
        <div class="modal-content large" style="max-height: 90vh; overflow-y: auto;">
            <div class="modal-header">
                <h2 id="modalTitle"><i class="fa-solid fa-pen"></i> Editar Publicação</h2>
                <span class="close-modal" onclick="document.getElementById('modalPublicar').classList.remove('active')">&times;</span>
            </div>
            <form id="formDojup">
                
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>Categoria (Documento do TJP)</label>
                        <select id="dojupCategoria" required>
                            <option value="Edital">Edital</option>
                            <option value="Ofício Circular">Ofício Circular</option>
                            <option value="Resolução">Resolução</option>
                            <option value="Ato Administrativo">Ato Administrativo</option>
                            <option value="Convocação">Convocação / Intimação</option>
                            <option value="Outros">Outros Documentos</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Órgão Emissor</label>
                        <input type="text" id="dojupOrgao" required placeholder="Ex: Tribunal de Justiça Policial">
                    </div>
                    <div class="form-group">
                        <label>Data Retroativa (Opcional)</label>
                        <input type="date" id="dojupData">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Título da Publicação</label>
                    <input type="text" id="dojupTitulo" required placeholder="Ex: EDITAL DE CONVOCAÇÃO Nº 01/2026">
                </div>
                
                <div class="form-group">
                    <label>Ementa / Resumo</label>
                    <textarea id="dojupEmenta" rows="2" placeholder="Ex: Dispõe sobre a abertura de vagas para o curso de Promotores..."></textarea>
                </div>
                
                <div class="form-group">
                    <label>Conteúdo Completo do Ato</label>
                    <textarea id="dojupConteudo" name="dojupConteudo"></textarea>
                </div>
                
                <button type="submit" class="btn-submit" id="btnSalvarDojup" style="margin-top: 15px;"><i class="fa-solid fa-cloud-arrow-up"></i> Salvar Documento</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, getDocs, query, orderBy, limit, startAfter, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const app = initializeApp({ apiKey: "AIzaSyBrez1ecIuGbmv5Q_NC1kTpIJhAT2kcnxs", authDomain: "monitores-sisap.firebaseapp.com", projectId: "monitores-sisap", storageBucket: "monitores-sisap.firebasestorage.app", messagingSenderId: "489679893157", appId: "1:489679893157:web:b1bbfaf4c0c5937d44534c" });
        const db = getFirestore(app);

        CKEDITOR.replace('dojupConteudo', {
            versionCheck: false, height: 350, allowedContent: true, pasteFilter: null, 
            extraPlugins: 'colorbutton,font,justify,image2,table', removeButtons: 'Save,ExportPdf,Preview,Print',
            removeDialogTabs: 'image:Upload'
        });

        // Função de Alerta Visual (Toast)
        window.showToast = (mensagem) => {
            const toast = document.getElementById("toast");
            document.getElementById("toastMessage").innerText = mensagem;
            toast.classList.add("active");
            setTimeout(() => {
                toast.classList.remove("active");
            }, 3000);
        };

        let editIdAtivo = null;
        window.publicacoesMemoria = {};
        
        let ultimoDocumentoAdmin = null;
        const itensPorPaginaAdmin = 20;

        // O Admin_layout.js cuida de barrar acessos, mas precisamos do nick para salvar o autor.
        const sessionData = localStorage.getItem("juspanel_session");
        const userJson = sessionData ? JSON.parse(sessionData) : {nick: 'Sistema'};

        window.abrirModalPublicar = () => {
            editIdAtivo = null;
            document.getElementById("formDojup").reset();
            document.getElementById("modalTitle").innerHTML = `<i class="fa-solid fa-file-circle-plus"></i> Nova Publicação`;
            CKEDITOR.instances['dojupConteudo'].setData('');
            document.getElementById("dojupData").valueAsDate = new Date();
            document.getElementById("modalPublicar").classList.add("active");
        };

        window.editarDojup = (id) => {
            const data = window.publicacoesMemoria[id];
            if(!data) return;
            editIdAtivo = id;
            document.getElementById("modalTitle").innerHTML = `<i class="fa-solid fa-pen"></i> Editando Publicação`;
            
            // Tratamento caso a categoria original não exista mais no select do HTML
            const selCategoria = document.getElementById("dojupCategoria");
            let optionExists = Array.from(selCategoria.options).some(opt => opt.value === data.categoria);
            if(!optionExists) {
                selCategoria.add(new Option(data.categoria, data.categoria));
            }

            selCategoria.value = data.categoria;
            document.getElementById("dojupOrgao").value = data.orgao;
            document.getElementById("dojupTitulo").value = data.titulo;
            document.getElementById("dojupEmenta").value = data.ementa || "";
            
            if(data.dataIso) {
                document.getElementById("dojupData").value = data.dataIso;
            }
            
            CKEDITOR.instances['dojupConteudo'].setData(data.conteudo);
            document.getElementById("modalPublicar").classList.add("active");
        };

        window.deletarDojup = async (id) => {
            if(confirm("Apagar permanentemente esta publicação do Diário Oficial?")) {
                await deleteDoc(doc(db, "tjp_dojup_publicacoes", id));
                const cardElement = document.getElementById('card-' + id);
                if(cardElement) cardElement.remove();
                window.showToast("Publicação apagada.");
            }
        };

        document.getElementById("formDojup").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("btnSalvarDojup");
            btn.disabled = true; btn.innerText = "Salvando...";

            const dataInput = document.getElementById("dojupData").value;
            const timestampData = dataInput ? new Date(dataInput + 'T12:00:00').getTime() : Date.now();

            const dados = {
                categoria: document.getElementById("dojupCategoria").value,
                orgao: document.getElementById("dojupOrgao").value.trim(),
                titulo: document.getElementById("dojupTitulo").value.trim(),
                ementa: document.getElementById("dojupEmenta").value.trim(),
                conteudo: CKEDITOR.instances['dojupConteudo'].getData(),
                dataIso: dataInput, 
                timestampDate: timestampData,
                autor: userJson.nick
            };

            try {
                if(editIdAtivo) {
                    dados.dataAtualizacao = serverTimestamp();
                    await updateDoc(doc(db, "tjp_dojup_publicacoes", editIdAtivo), dados);
                    window.showToast("Publicação atualizada!");
                } else {
                    dados.dataCriacao = serverTimestamp();
                    const newId = "dojup_tjp_" + Date.now();
                    await setDoc(doc(db, "tjp_dojup_publicacoes", newId), dados);
                    window.showToast("Documento publicado no Diário!");
                }
                document.getElementById("modalPublicar").classList.remove("active");
                carregarDadosDojup(true);
            } catch(err) {
                alert("Erro ao salvar: " + err.message);
            }
            btn.disabled = false; btn.innerHTML = `<i class="fa-solid fa-cloud-arrow-up"></i> Salvar Documento`;
        });

        window.carregarDadosDojup = async (reset = false) => {
            const list = document.getElementById("listaPublicacoes");
            const btnMais = document.getElementById("btnCarregarMais");

            if (reset) {
                list.innerHTML = '<div style="text-align:center; padding: 40px; color: gray;"><i class="fa-solid fa-spinner fa-spin"></i> Carregando registros...</div>';
                ultimoDocumentoAdmin = null;
                window.publicacoesMemoria = {};
            }

            let q = query(collection(db, "tjp_dojup_publicacoes"), orderBy("timestampDate", "desc"), limit(itensPorPaginaAdmin));
            
            if (ultimoDocumentoAdmin && !reset) {
                q = query(collection(db, "tjp_dojup_publicacoes"), orderBy("timestampDate", "desc"), startAfter(ultimoDocumentoAdmin), limit(itensPorPaginaAdmin));
            }

            const snapshot = await getDocs(q);

            if (reset) list.innerHTML = "";

            if (snapshot.empty && reset) {
                list.innerHTML = `<div style="text-align:center; padding: 40px; color: gray;">Nenhuma publicação registrada.</div>`;
                btnMais.style.display = "none";
                return;
            }

            snapshot.forEach(d => {
                const data = d.data();
                window.publicacoesMemoria[d.id] = data; 
                
                let dataFormatada = data.dataIso ? new Date(data.dataIso + 'T12:00:00').toLocaleDateString('pt-BR') : "Data indefinida";

                list.innerHTML += `
                    <div class="dojup-card-admin" id="card-${d.id}">
                        <div style="flex:1;">
                            <span class="badge-dojup">${data.categoria}</span> <span style="font-size:12px; color:gray; margin-left:10px;"><i class="fa-solid fa-calendar"></i> ${dataFormatada}</span>
                            <h3 style="margin: 8px 0 5px; font-size: 15px; color: var(--text-main);">${data.titulo}</h3>
                            <p style="margin:0; font-size:12px; color:var(--text-muted);">${data.orgao}</p>
                        </div>
                        <div style="display:flex; gap:10px;">
                            <button type="button" onclick="editarDojup('${d.id}')" class="btn-icon edit"><i class="fa-solid fa-pen"></i></button>
                            <button type="button" onclick="deletarDojup('${d.id}')" class="btn-icon delete"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>`;
            });

            ultimoDocumentoAdmin = snapshot.docs[snapshot.docs.length - 1];
            btnMais.style.display = snapshot.docs.length === itensPorPaginaAdmin ? "block" : "none";
        };

        window.carregarMaisDojup = () => carregarDadosDojup();

        carregarDadosDojup(true);

    </script>
</body>
</html>
