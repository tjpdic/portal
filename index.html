<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal TJP | Tribunal de Justiça Policial DIC</title>
    <link rel="icon" href="assets/img/logo-tjp.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <div id="global-header"></div>

    <div class="container">
        <div class="portal-cover" id="carouselContainer">
            <div class="carousel-track" id="carouselTrack"></div>
            <div class="carousel-dots" id="carouselDots"></div>
        </div>

        <div class="main-wrapper">
            <main class="content">
                <section class="feed-section">
                    <div class="section-title">
                        <h2><i class="fa-solid fa-newspaper"></i> Últimas Publicações</h2>
                    </div>
                    <div class="news-grid" id="portalFeed"></div>
                </section>
            </main>

            <aside class="sidebar">
                <div class="widget card-doj">
                    <div class="widget-header">
                        <h3>Diário Oficial da Justiça</h3>
                    </div>
                    <div class="widget-body">
                        <p>Acesse as últimas decisões, portarias e nomeações oficiais do TJP.</p>
                        <a href="diario-oficial.html" class="btn-primary"><i class="fa-solid fa-search"></i> Consultar Edições</a>
                    </div>
                </div>

                <div class="widget">
                    <div class="widget-header">
                        <h3>Sessões de Julgamento</h3>
                    </div>
                    <div class="widget-body">
                        <ul class="agenda-list">
                            <li>
                                <div class="agenda-date">28<span>MAR</span></div>
                                <div class="agenda-info">
                                    <strong>Plenário Virtual</strong>
                                    <span>14:00 - Recursos</span>
                                </div>
                            </li>
                        </ul>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <div id="global-footer"></div>

    <script type="module">
        // Importa o layout (que constrói a tela instantaneamente) e a conexão do banco
        import { db } from "./assets/js/layout.js";
        import { doc, collection, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        // LÓGICA EXCLUSIVA DA PÁGINA INICIAL
        let carouselInterval;
        onSnapshot(doc(db, "tjp_config", "banners"), (snap) => {
            const track = document.getElementById("carouselTrack");
            const dots = document.getElementById("carouselDots");
            clearInterval(carouselInterval);
            
            let banners = [];
            if(snap.exists() && snap.data().lista) banners = snap.data().lista;
            
            track.innerHTML = ""; dots.innerHTML = "";
            
            if(banners.length === 0) {
                document.getElementById("carouselContainer").style.display = "none";
                return;
            }
            document.getElementById("carouselContainer").style.display = "block";

            banners.forEach((url, i) => {
                track.innerHTML += `<div class="carousel-slide"><img src="${url}"></div>`;
                if(banners.length > 1) {
                    dots.innerHTML += `<span class="${i===0 ? 'active':''}" data-index="${i}"></span>`;
                }
            });

            if(banners.length > 1) {
                let index = 0;
                const slideTo = (i) => {
                    index = i;
                    track.style.transform = `translateX(-${index * 100}%)`;
                    document.querySelectorAll('.carousel-dots span').forEach((d, idx) => {
                        d.classList.toggle('active', idx === index);
                    });
                };
                carouselInterval = setInterval(() => { slideTo((index + 1) % banners.length); }, 5000);
                
                document.querySelectorAll('.carousel-dots span').forEach(dot => {
                    dot.onclick = (e) => {
                        clearInterval(carouselInterval);
                        slideTo(parseInt(e.target.dataset.index));
                        carouselInterval = setInterval(() => { slideTo((index + 1) % banners.length); }, 5000);
                    };
                });
            } else {
                track.style.transform = `translateX(0%)`;
            }
        });

        const portalFeed = document.getElementById("portalFeed");
        onSnapshot(query(collection(db, "tjp_publicacoes"), orderBy("dataCriacao", "desc"), limit(10)), (snapshot) => {
            portalFeed.innerHTML = "";
            if(snapshot.empty) return;

            snapshot.forEach((docSnap) => {
                const data = docSnap.data(); 
                const id = docSnap.id;
                
                let dataFormatada = "Hoje";
                if(data.dataCriacao) dataFormatada = data.dataCriacao.toDate().toLocaleDateString('pt-BR');

                const bClass = data.categoria === 'Informativo' ? 'info' : '';
                const cClass = data.capa ? 'has-cover' : '';
                const stCover = data.capa ? `style="background-image: url('${data.capa}');"` : '';
                
                portalFeed.innerHTML += `
                    <a href="post.html?id=${id}#${id}" class="news-card ${cClass}" ${stCover} style="text-decoration:none; color:inherit; display:flex;">
                        <div class="news-content">
                            <span class="news-tag ${bClass}">${data.categoria}</span>
                            <h3>${data.titulo}</h3>
                            <p>${data.resumo}</p>
                            <div class="news-meta">
                                <span><i class="fa-regular fa-calendar"></i> ${dataFormatada} | ${data.autor}</span>
                            </div>
                        </div>
                    </a>
                `;
            });
        });
    </script>
</body>
</html>
